name: reservas-fondoxyz

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: reservas-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "SQLCMD=$$(command -v sqlcmd || true); if [ -z \"$$SQLCMD\" ]; then for p in /opt/mssql-tools18/bin/sqlcmd /opt/mssql-tools/bin/sqlcmd; do [ -x \"$$p\" ] && SQLCMD=\"$$p\" && break; done; fi; $$SQLCMD -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  db-init:
    image: mcr.microsoft.com/mssql-tools:latest
    container_name: reservas-db-init
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    volumes:
      - ./DatabaseScript.sql:/init/DatabaseScript.sql:ro
      - ./StoredProcedures.sql:/init/StoredProcedures.sql:ro
      - ./scripts/db/init.sh:/init/init.sh:ro
    entrypoint: ["/bin/bash", "/init/init.sh"]
    restart: "no"

volumes:
  mssql_data:
